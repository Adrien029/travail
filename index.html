<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Formulaire étude </title>
  <style>
    /* ========== page ========== */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fbf3f8;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    /* ========== carte centrale ========== */
    .card {
      background: white;
      padding: 40px 30px 60px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 14px 40px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 90%;
      position: relative;
    }

    /* cœurs décoratifs */
    .card::before,
    .card::after {
      content: "❤️";
      position: absolute;
      font-size: 32px;
      opacity: 0.6;
      pointer-events: none;
    }
    .card::before {
      top: -20px;
      left: 50%;
      transform: translateX(-50%) rotate(-15deg);
    }
    .card::after {
      top: -10px;
      left: calc(50% + 40px);
      transform: rotate(10deg);
      font-size: 24px;
    }

    h1 {
      margin: 0 0 28px;
      font-size: 26px;
      color: #333;
      line-height: 1.2;
      font-weight: normal;
    }

    /* ========== boutons ========== */
    .buttons {
      position: relative;
      height: 60px; /* espace pour le bouton qui bouge */
    }

    button {
      padding: 12px 28px;
      border-radius: 24px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      position: absolute;
      top: 0;
      white-space: nowrap;
    }

    #yes {
      left: 0;
      background: #ff4d6d;
      color: white;
      box-shadow: 0 4px 12px rgba(255, 77, 109, 0.35);
    }
    #yes:hover {
      transform: scale(1.05);
    }

    #no {
      background: white;
      color: #ff4d6d;
      border: 2px solid #ff4d6d;
      left: calc(50% + 10px); /* position initial, will change */
      transform: translateX(-50%);
    }

    /* message final */
    .final-message {
      display: none;
      margin-top: 30px;
      font-size: 18px;
      color: #ff4d6d;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Cloé , veux-tu être ma Valentine ?</h1>
    <div class="buttons">
      <button id="yes">Oui ! →</button>
      <button id="no">Non 😢</button>
    </div>
    <div class="final-message" id="final">
      💕 Je savais que tu allais dire oui 💕
    </div>
  </div>

  <script>
    const yes = document.getElementById('yes');
    const no = document.getElementById('no');
    const final = document.getElementById('final');

    // textes alternatifs pour le bouton Non
    const noTexts = [
      'Dernière chance !',
      'Réfléchis bien...',
      'Tu veux vraiment dire non ?',
      'Un petit doute ?'
    ];
    let noIndex = 0;

    // fonction pour déplacer le bouton Non
    function moveNoButton() {
      const parent = no.parentElement;
      const parentWidth = parent.clientWidth;
      const parentHeight = parent.clientHeight;
      const btnRect = no.getBoundingClientRect();

      // calculer limites pour que le bouton reste visible
      const maxX = parentWidth - btnRect.width;
      const maxY = parentHeight - btnRect.height;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      no.style.left = randomX + 'px';
      no.style.top = randomY + 'px';

      // changer le texte
      noIndex = (noIndex + 1) % noTexts.length;
      no.textContent = noTexts[noIndex];
    }

    // déclenchement au survol
    no.addEventListener('mouseover', moveNoButton);

    // message final au clic Oui
    yes.addEventListener('click', () => {
      final.style.display = 'block';
      // optionnel : cacher les boutons
      yes.style.display = 'none';
      no.style.display = 'none';
    });
  </script>
</body>
</html>
